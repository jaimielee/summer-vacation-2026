<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7a64b" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>우리 가족 여름 휴가 2026</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="top">
      <div>
        <h1>우리 가족 여름 휴가</h1>
        <p class="sub">2026 · 7월 29일 ~ 8월 8일</p>
      </div>
      <div class="emoji">🏖️</div>
    </div>

    <div class="month">
      <div class="legend" id="legend"></div>
      <div class="dow" id="dow"></div>
      <div id="calendar"></div>
    </div>

    <p class="foot">날짜를 눌러 그날의 상세 계획을 확인하세요 👆</p>
  </div>

  <!-- 상세 시트 -->
  <div class="sheet-bg" id="sheet-bg"></div>
  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <div class="sheet-head">
      <button class="back" id="sheet-back">←</button>
      <div class="date-big" id="sheet-date"></div>
      <p class="date-sub" id="sheet-title"></p>
      <div class="tags" id="sheet-tags"></div>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
